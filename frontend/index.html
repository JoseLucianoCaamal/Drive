<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/img/akko.png" type="image/png">
    <title>Drive AKKO</title>
</head>
<body>
    <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema">☀️</button>

    <header>
        <img src="/img/akko.png" alt="Logo AKKO" class="logo">
        <h1>Drive AKKO</h1>
    </header>

    <div id="toast" class="toast"></div>
    
    <!-- PANTALLA DE LOGIN -->
    <main id="login-view" class="container">
        <div class="login-card">
            <h2>Iniciar Sesión</h2>
            <p class="text-muted">Ingresa tus credenciales para acceder a la bóveda.</p>
            <input type="text" id="username" placeholder="Usuario" class="custom-input">
            <input type="password" id="password" placeholder="Contraseña" class="custom-input">
            <button class="btn-primary" onclick="login()">Entrar</button>
        </div>
    </main>

    <!-- PANTALLA PRINCIPAL DEL DRIVE (Oculta al inicio) -->
    <main id="app-view" class="container" style="display: none;">
        <div class="user-bar">
            <span id="welcome-text">Bienvenido</span>
            <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
        </div>

        <div class="upload-card">
            <h2>Subir Archivo</h2>
            <p id="current-folder-label" class="badge">Subiendo a: Raíz</p>
            
            <label class="custom-file-upload">
                <div class="upload-icon">☁️</div>
                <span id="file-name">Haz clic para seleccionar un archivo</span>
                <input type="file" id="inputArchivo" onchange="mostrarNombre()">
            </label>
            
            <button class="btn-primary" onclick="subirArchivo()">🚀 Subir al Servidor</button>
        </div>

        <div class="explorer-card">
            <h3>Mis Archivos</h3>
            <div id="file-list">
                <div class="loader">Cargando...</div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
