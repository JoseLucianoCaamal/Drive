<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/img/akko.png" type="image/png">
    <title>Drive AKKO</title>
</head>
<body>
    <header>
        <img src="/img/akko.png" alt="Logo AKKO" class="logo">
        <h1>Drive AKKO</h1>
    </header>

    <main class="container">
        <!-- Tarjeta de subida -->
        <div class="upload-card">
            <h2>Subir Archivo</h2>
            <input type="file" id="inputArchivo">
            <button onclick="subirArchivo()">Subir al Servidor</button>
        </div>

        <!-- Nueva Tarjeta de explorador -->
        <div class="explorer-card">
            <h3>Mis Archivos</h3>
            <div id="file-list">Cargando...</div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
