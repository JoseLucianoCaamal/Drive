<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/img/akko.png" type="image/png">
    <title>Drive AKKO</title>
</head>
<body>
    <!-- Botones superiores -->
    <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema">☀️</button>
    <button id="login-btn-top" class="btn-login-top" onclick="abrirModal()">🔑 Ingresar</button>
    
    <!-- Barra de usuario (Oculta si no hay sesión) -->
    <div id="user-bar-top" class="user-bar-top" style="display: none;">
        <span id="welcome-text">👑</span>
        <button class="btn-logout" onclick="logout()">Salir</button>
    </div>

    <header>
        <img src="/img/akko.png" alt="Logo AKKO" class="logo">
        <h1>Drive AKKO</h1>
    </header>

    <div id="toast" class="toast"></div>

    <!-- MODAL DE LOGIN OCULTO -->
    <div id="login-modal" class="modal-overlay" style="display: none;">
        <div class="login-card modal-content">
            <span class="close-btn" onclick="cerrarModal()">&times;</span>
            <h2>Bóveda AKKO</h2>
            <p class="text-muted">Acceso exclusivo para administradores.</p>
            <input type="text" id="username" placeholder="Usuario" class="custom-input">
            <input type="password" id="password" placeholder="Contraseña" class="custom-input">
            <button class="btn-primary" onclick="login()">Entrar</button>
        </div>
    </div>
    
    <!-- CONTENEDOR PRINCIPAL -->
    <main class="container">
        <!-- Tarjeta de subida (Oculta a los invitados) -->
        <div id="upload-section" class="upload-card" style="display: none;">
            <h2>Subir Archivo</h2>
            <p id="current-folder-label" class="badge">Subiendo a: Raíz</p>
            
            <label class="custom-file-upload">
                <div class="upload-icon">☁️</div>
                <span id="file-name">Haz clic para seleccionar un archivo</span>
                <input type="file" id="inputArchivo" onchange="mostrarNombre()">
            </label>
            
            <button class="btn-primary" onclick="subirArchivo()">🚀 Subir al Servidor</button>
        </div>

        <!-- Explorador SIEMPRE visible -->
        <div class="explorer-card">
            <h3>Archivos Públicos</h3>
            <div id="file-list">
                <div class="loader">Cargando...</div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
